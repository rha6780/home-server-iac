- name: Get Proxmox VM list
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Install required collections
      ansible.builtin.command:
        cmd: ansible-galaxy collection install -r collections/requirements.yml -p collections --force
      connection: local
      args:
        chdir: "{{ semaphore_repository_path }}/semaphore"

    - name: Fetch VM list from Proxmox
      community.proxmox.proxmox_vm_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        validate_certs: false
      register: vm_info

    - name: Show VM list
      debug:
        var: vm_info.proxmox_vms

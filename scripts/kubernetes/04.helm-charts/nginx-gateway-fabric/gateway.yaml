# ============================================================
# Gateway 리소스 - 클러스터 진입점 정의
# kubectl apply -f gateway.yaml
# ============================================================
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All   # 모든 namespace 의 HTTPRoute 허용. 제한 시 "Selector" 사용
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: tls-secret     # [필요 시] TLS Secret 이름으로 변경
            namespace: nginx-gateway
      allowedRoutes:
        namespaces:
          from: All

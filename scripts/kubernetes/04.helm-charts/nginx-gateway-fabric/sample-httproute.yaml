# ============================================================
# HTTPRoute 예시 - 애플리케이션 라우팅 정의
# (기존 Ingress 리소스 대신 사용)
# ============================================================
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-example
  namespace: default
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "app.example.your-domain.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-example-svc   # 실제 Service 이름으로 변경
          port: 80
